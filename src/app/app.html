<!-- PANTALLA INTRO -->
<div class="intro" *ngIf="showIntro">
  <div class="intro__inner">
    <div class="intro__icon">📩</div>
    <p class="intro__label">Comunicado entrante de</p>
    <h1 class="intro__nombre">Leo Messi</h1>
    <p class="intro__sub">🇦🇷 Mensaje personal para Ana</p>
    <button class="intro__btn" (click)="startConversation()">Click para continuar</button>
  </div>
</div>

<!-- PANTALLA PRINCIPAL: CONVERSACIÓN CON MESSI -->
<div class="scene" *ngIf="!showIntro && !showEnd" [class.fade-out]="animating">

  <!-- PROGRESO -->
  <div class="progress-bar">
    <div class="progress-bar__fill" [style.width]="((currentIndex + 1) / slides.length * 100) + '%'"></div>
  </div>
  <span class="progress-label">{{ progress }}</span>

  <!-- FOTO DE MESSI -->
  <div class="messi-wrap">
    <img [src]="currentSlide.foto" alt="Messi" class="messi-img" />
    <div class="messi-name">🇦🇷 Leo Messi</div>
  </div>

  <!-- GLOBO DE DIÁLOGO -->
  <div class="bubble-wrap">
    <div class="bubble">
      <p class="bubble__text">{{ typedText }}<span class="cursor" *ngIf="isTyping">|</span></p>
    </div>
    <div class="bubble__hint typing-hint" *ngIf="isTyping">
      Click en Siguiente para saltar...
    </div>
  </div>

  <!-- NAVEGACIÓN -->
  <div class="nav-btns">
    <button class="nav-btn nav-btn--prev" (click)="prev()">← Anterior</button>
    <button class="nav-btn nav-btn--next" (click)="next()">Siguiente →</button>
  </div>

</div>

<!-- PANTALLA FINAL -->
<div class="final" *ngIf="showEnd">
  <div class="final__inner">
    <div class="final__trophy">🏆</div>
    <p class="final__comunicado">Fin del comunicado de Leo Messi</p>
    <button class="final__btn" (click)="restart()">Volver al principio</button>
  </div>
</div>
